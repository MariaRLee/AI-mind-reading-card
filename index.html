<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emotion Flower Card Selector</title>
  <link rel="stylesheet" href="style.css">
</head>
  <body>
  <main class="app">

    <h1>AI-Mind Care 情緒花卡</h1>

    <p class="intro">
      看見情緒，讀懂自己，讓心如花綻放。<br>
      輸入情緒數值（-6.0 ～ +6.0），找到自己專屬情緒的花朵、花語與鼓勵話語。
    </p>
<--
    <form id="emotion-form" novalidate>
      <input
        id="emotion-input"
        name="emotion"
        type="number"
        min="-6.00"
        max="6.00"
        step="0.01"
        value="1.68"
        inputmode="decimal"
        aria-label="情緒數值"
        required
      >

      <button type="submit">選擇花卡</button>
    </form>
  -->
  <form id="emotion-form" novalidate>

  <div class="emotion-input-wrap">
    <input
      id="emotion-input"
      name="emotion"
      type="number"
      min="-6"
      max="6"
      step="0.01"
      value="1.68"
      inputmode="decimal"
      aria-label="情緒數值"
      required
    >

    <!-- Displayed only on mobile -->
    <div class="mobile-stepper">
      <button
        type="button"
        id="step-up"
        aria-label="增加情緒數值"
      >
        ▲
      </button>

      <button
        type="button"
        id="step-down"
        aria-label="減少情緒數值"
      >
        ▼
      </button>
    </div>
  </div>

  <button type="submit" class="select-button">
    選擇花卡
  </button>

</form>

    <p id="error-message" class="error" role="alert"></p>

    <section id="result" class="result" hidden>
      <div class="preview">
        <img id="card-image" alt="">
        <div id="missing-card" class="missing" hidden></div>
      </div>

      <div class="details">
        <h2 id="stage-title"></h2>

        <p class="info-row">
          <span class="label">輸入情緒值</span>
          <span id="emotion-value" class="value"></span>
        </p>

        <p class="info-row">
          <span class="label">情緒等級</span>
          <span id="emotion-level" class="value"></span>
        </p>
 
        
        <p class="info-row">
          <span class="label">花開區間</span>
          <span id="emotion-range" class="value"></span>
        </p>

      
        <p class="info-row">
          <span class="label">花卡檔案</span>
          <span id="card-file" class="value"></span>
        </p>

        <p class="info-row">
          <span class="label">圖片路徑</span>
          <code id="card-path" class="value"></code>
        </p>
      </div>
    </section>
  </main>

  <script src="selector.js"></script>
  <script>
    "use strict";

    const form = document.getElementById("emotion-form");
    const input = document.getElementById("emotion-input");
    const resultSection = document.getElementById("result");
    const errorMessage = document.getElementById("error-message");
    const image = document.getElementById("card-image");
    const missingCard = document.getElementById("missing-card");

    function displayCard(rawEmotion) {
      errorMessage.textContent = "";

      try {
        const selected = FlowerCardSelector.selectFlowerCard(rawEmotion);

        document.getElementById("emotion-value").textContent =
          selected.emotion.toFixed(2);
        document.getElementById("emotion-level").textContent =
          selected.level > 0 ? `+${selected.level}` : String(selected.level);
        document.getElementById("emotion-range").textContent = selected.range;
        document.getElementById("stage-title").textContent =
          `第 ${selected.stage} 張｜${selected.stageName}`;
        document.getElementById("card-file").textContent = selected.fileName;
        document.getElementById("card-path").textContent = selected.cardPath;

        image.hidden = false;
        missingCard.hidden = true;
        image.alt = `情緒 ${selected.emotion.toFixed(2)} 的${selected.stageName}花卡`;
        image.src = `${selected.cardPath}?v=${Date.now()}`;

        image.onload = function () {
          image.hidden = false;
          missingCard.hidden = true;
        };

        image.onerror = function () {
          image.hidden = true;
          missingCard.hidden = false;
          missingCard.innerHTML =
            `已選到 <strong>${selected.fileName}</strong>，但尚未在指定位置找到圖片。` +
            `<br>請將花卡放到：<br><code>${selected.cardPath}</code>`;
        };

        resultSection.hidden = false;
      } catch (error) {
        resultSection.hidden = true;
        errorMessage.textContent = error.message;
      }
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      displayCard(input.value);
    });

    displayCard(input.value);
  </script>
</body>
</html>
