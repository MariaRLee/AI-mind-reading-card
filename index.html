<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Restrict this static page to local scripts, styles, and card images. -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; font-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'self'; frame-src 'none'; media-src 'none'; worker-src 'none'; upgrade-insecure-requests"
  >
  <meta name="referrer" content="no-referrer">

  <title>AI-Mind Care 情緒花卡</title>
  <link rel="stylesheet" href="style.css">

  <script src="selector.js" defer></script>
  <script src="app.js" defer></script>
</head>

<body>
  <main class="app">
    <header class="page-header">
      <h1>AI-Mind Care 情緒花卡</h1>

      <a
        class="home-button"
        href="https://www.hyloveclub.com"
        aria-label="回到 HyLove 首頁"
        referrerpolicy="no-referrer"
      >
        Home
      </a>
    </header>

    <p class="intro">
      看見情緒，讀懂自己，讓心如花綻放。<br>
      輸入情緒數值（-6.0 ～ +6.0），找到自己專屬情緒的花朵、花語與鼓勵關懷語。
    </p>

    <form id="emotion-form" novalidate autocomplete="off">
      <div class="emotion-input-wrap">
        <input
          id="emotion-input"
          type="number"
          min="-6"
          max="6"
          step="0.01"
          value="1.68"
          inputmode="decimal"
          autocomplete="off"
          spellcheck="false"
          aria-label="情緒數值"
          required
        >

        <div class="mobile-stepper" aria-label="情緒數值調整按鈕">
          <button type="button" id="step-up" aria-label="增加情緒數值">▲</button>
          <button type="button" id="step-down" aria-label="減少情緒數值">▼</button>
        </div>
      </div>

      <button type="submit" class="select-button">選擇花卡</button>
    </form>

    <p id="error-message" class="error" role="alert"></p>

    <section id="result" class="result" hidden>
      <div class="preview">
        <img id="card-image" alt="">
        <div id="missing-card" class="missing" hidden></div>
      </div>

      <div class="details">
        <h2 id="stage-title"></h2>

        <p class="info-row">
          <span class="label">輸入情緒值</span>
          <span id="emotion-value" class="value"></span>
        </p>

        <p class="info-row">
          <span class="label">情緒等級</span>
          <span id="emotion-level" class="value"></span>
        </p>

        <p class="info-row">
          <span class="label">花開區間</span>
          <span id="emotion-range" class="value"></span>
        </p>

        <p class="info-row">
          <span class="label">花卡檔案</span>
          <span id="card-file" class="value"></span>
        </p>

        <p class="info-row">
          <span class="label">圖片路徑</span>
          <code id="card-path" class="value"></code>
        </p>
      </div>
    </section>

    <p id="privacy-note" class="privacy-note">
      隱私說明：您輸入的情緒數值只在本裝置的瀏覽器中處理，用於選擇花卡；本頁程式不使用分析追蹤、Cookie 或本機儲存，也不會傳送或保存您的輸入值。
    </p>

    <p class="company-credit">@Hylove Business Inc.</p>
  </main>
</body>
</html>
